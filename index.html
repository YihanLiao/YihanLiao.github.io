<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/images/appicon/app_icon.png">
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-status-bar" content="#000000">
    <title>Pwa Project</title>
  </head>
  <body>
    <h1>PWA Project TEST</h1>
    <div>
      <h1 id="pwadetect"></h1>
      <button>
        <a href="https://www.google.com/" target="_blank">Google</a>
      </button>
      <button>
        <span onclick="location.href = 'https://www.google.com/'">Google</span>
      </button>
      <button>
        <span onclick="showiframe()">Game Launch iframe</span>
      </button>
      <div id="lunchGameWrapper">
        <div id="webframeBackButton" onclick="hideiframe()"> << </div>
        <iframe src="" frameborder="1" id="webframe"></iframe>
      </div>
      <div>
        <img src="/images/uf6ej9452l.jpg" alt="奇怪的知識增加了">
      </div>
    </div>
    <script src="/javascripts/main.js"></script>
    <script>
      window.addEventListener('load', async () => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/javascripts/service-worker.js')
          .then(function(registration) {
            registration.update();
          }).catch(function(error) {
            console.error('Registration failed with ' + error);
          });
        }
      });
    </script>
  </body>
</html>
